<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando scripts</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
        }
    </style>
</head>
<body>
    

    <script>
        var nome = window.prompt('Qual é o seu nome? ')
        document.writeln(`Olá <strong>${nome}!</strong>, Seu nome têm ${nome.length} letras.<br/>`)
        document.writeln(`Seu nome em maiuscilo é ${nome.toLocaleUpperCase()} </br>`)
        document.writeln(`Seu nome em minusculo fica ${nome.toLocaleLowerCase()}`)
    </script>
</body>
</html>
